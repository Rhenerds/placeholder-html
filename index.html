<!doctype html>
<html lang="en">
    <head>
        <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Nerds Landing Page</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background-image: url(background-compressed.png);
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                height: 100vh;
                color: #ffffff;
                margin: 0;
                padding: 20px;
                overflow-y: hidden;
            }
            a {
                color: #ffffff;
                font-weight: bold;
            }
            .center-container {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100%;
            }
            @keyframes float {
                0%,
                100% {
                    transform: translateY(0);
                }
                50% {
                    transform: translateY(-10px);
                }
            }
            .floating {
                animation: float 5s ease-in-out infinite;
            }
        </style>
    </head>
    <body>
        <div class="center-container">
            <img
                src="wip_vtPC.png"
                alt="Work in Progress"
                class="floating"
                style="
                    max-width: 100%;
                    height: auto;
                    display: block;
                    margin: 0 auto;
                "
            />
            <p>
                art by
                <a href="hhttps://www.instagram.com/xiliam88" target="_blank"
                    >xiliam88</a
                >
            </p>
            <img
                src="logo_vtPC.png"
                alt="Nerds Logo"
                style="
                    max-width: 100%;
                    height: auto;
                    display: block;
                    margin: 20px auto;
                "
            />
        </div>
    </body>
</html>
